    <style>
        /* Base Reset */
        body { background-color: #0a0a0a; color: #ffffff; font-family: Arial, sans-serif; margin: 0; padding: 0; }
        
        /* 1. Top Header */
        header { background-color: #000000; padding: 20px 0; text-align: center; border-bottom: 2px solid #ff4d4d; }
        header a { text-decoration: none; }
        h1 { margin: 0; font-size: 24px; color: #ff4d4d; text-transform: uppercase; letter-spacing: 2px; }

        .sticky-author-bar {
            position: sticky;
            top: 0; 
            background-color: rgba(17, 17, 17, 0.95);
            backdrop-filter: blur(5px);
            border-bottom: 1px solid #333;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            text-decoration: none;
            transition: 0.2s;
        }
        .sticky-author-bar:hover { background-color: #222; }
        .author-mini-avatar { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; border: 2px solid #f2e205; margin-right: 12px; }
        .author-mini-name { font-size: 14px; font-weight: bold; color: #fff; text-transform: uppercase; letter-spacing: 1px; }
        .author-mini-hint { font-size: 11px; color: #aaa; margin-left: 8px; }

        /* 3. Manga Reader Container */
        .reader-container {
            max-width: 900px; 
            margin: 0 auto;
            display: flex;
            flex-direction: column;
        }
         
        .manga-img {
            width: 100%;
            height: auto;
            display: block;
            margin: 0;
        }

        /* 4. Bottom Navigation */
        .bottom-nav {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px 20px 20px;
            display: flex;
            justify-content: space-between;
            gap: 15px;
        }
        .nav-btn {
            flex: 1;
            text-align: center;
            padding: 15px;
            font-size: 14px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.2s;
            text-transform: uppercase;
        }
        .btn-hub { background-color: #1a1a1a; color: #ddd; border: 1px solid #333; }
        .btn-hub:hover { background-color: #333; color: #fff; }
        .btn-next { background-color: #ff4d4d; color: #fff; }
        .btn-next:hover { background-color: #e60000; transform: translateY(-2px); }

    </style>
</head>
